version: '3.8'

services:
  aidhelper-bot:
    build: .
    container_name: aidhelper-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Монтируем директорию с данными для сохранения базы данных
      - ./data:/app/data
      # Монтируем директорию с логами, чтобы они сохранялись в проекте на хосте
      - ./logs:/app/logs
    environment:
      - DB_PATH=/app/data/medication.db
